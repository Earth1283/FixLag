log_plugin_disabled: "<yellow>FixLag is disabling..."
log_plugin_goodbye: "<gray>Goodbye!"
log_smart_clear_triggered: "<yellow>TPS is low (<aqua><tps><yellow>). Triggering smart clear."
log_entity_deleted: "<aqua>Deleted <white><count> <aqua>unnecessary entities."
