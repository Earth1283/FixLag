# Startup Logs
log_startup_version: "<aqua>FixLag <white>v<version> <aqua>loading..."
log_startup_config_loaded: "<green>Configuration loaded."
log_startup_features_header: "<aqua>Active features:"
log_startup_feature_status: "  <gray>- <white><feature><gray>: <status>"
log_startup_events_registered: "<green>Event listeners registered."
log_startup_tasks_started: "<green>Background tasks started."
log_startup_ready: "<green><bold>FixLag v<version> is ready!</bold>"

# Chunk Analysis
chunk_analysis_started: "<yellow>Analyzing chunks... This may take a moment."
chunk_analysis_header: "<yellow>--- Top 10 Chunks by Entity Count ---"
chunk_analysis_no_data: "<red>No loaded chunks with entities found."
chunk_analysis_entry: " <gray>- <gold><world> <gray>(<x>, <z>): <green><count> Entities"

# v3.8 New Messages
distance_decreased: "<yellow>Server performance is low. View distance decreased to <view> and simulation distance to <sim>."
distance_increased: "<green>Server performance has improved. View distance increased to <view> and simulation distance to <sim>."

# Optimization Config
optimize_config_header: "<yellow>--- Optimized Configuration Proposal ---"
optimize_config_entry: " <gray>- <gold>%file%<gray>: <aqua>%key% <red>%old% <gray>-> <green>%new%"
optimize_config_footer: "<gray>Click an action: <click:run_command:'/fixlag optimizeconfig accept'><hover:show_text:'<green>Apply changes to original files'><green>[Accept]</green></hover></click> <click:run_command:'/fixlag optimizeconfig save-new'><hover:show_text:'<gold>Save to new *.changed files'><gold>[Write to file]</gold></hover></click> <click:run_command:'/fixlag optimizeconfig reject'><hover:show_text:'<red>Discard all changes'><red>[Reject]</red></hover></click>"
optimize_config_no_changes: "<green>Your configuration is already optimized!"
optimize_config_no_pending: "<red>No pending configuration changes found. Run /fixlag optimizeconfig first."
optimize_config_applied: "<green>Configuration changes have been applied successfully!"
optimize_config_rejected: "<yellow>Configuration changes have been rejected."
optimize_config_error: "<red>An error occurred while saving the configuration: %error%"

# Lag Notifications
lag_alert_tps: "<red><bold>WARNING:</bold> <yellow>Server TPS has dropped to <red>%fixlag_tps%</red>!"
lag_alert_ram: "<red><bold>WARNING:</bold> <yellow>Server RAM usage is critically high (<red>%fixlag_ram_percent%%</red>)!"
lag_alert_ping: "<red><bold>WARNING:</bold> <yellow>Average player ping is very high (<red>%fixlag_avg_ping% ms</red>)!"
