# Use Minecraft color codes or MiniMessage color codes

prefix: "<#87CEEB>[<#90EE90>ꜰɪxʟᴀɢ</#90EE90>] </#87CEEB><reset>"
entity_clear_manual: "<green>Manually cleared unnecessary entities..."
entity_clear_broadcast: "<green>Cleaned up <dark_green>%fixlag_count% <green>unnecessary entities. Use <gold>/fixlag retrieve</gold> to recover them."
entity_clear_warning: "<yellow>Entities will be cleared in <gold>%fixlag_time% <yellow>seconds."
retrieve_command_in_cooldown: "<red>You can't use this command while the items are being collected."
retrieve_command_no_items: "<red>There are no items to retrieve."
permission_denied: "<red>You do not have permission to use this command."
gc_info_header: "<yellow>--- JVM Memory & GC Info ---"
server_info_header: "<yellow>--- Server Information ---"
server_info_tps: "<green>TPS (Last 1m, 5m, 15m): <white>%fixlag_tps_1m%, %fixlag_tps_5m%, %fixlag_tps_15m%"
server_info_mspt: "<green>MSPT (Last 1m): <white>%fixlag_mspt_1m% ms"
server_info_mspt_5m: "<green>MSPT (Last 5m): <white>%fixlag_mspt_5m% ms"
server_info_mspt_15m: "<green>MSPT (Last 15m): <white>%fixlag_mspt_15m% ms"
server_info_ram: "<green>RAM Usage: <white>%fixlag_used_ram%MB / %fixlag_total_ram%MB [%fixlag_ram_percentage%]"
server_info_cpu: "<green>CPU Usage: <white>%fixlag_cpu_usage%"
server_info_ping: "<green>Average Ping: <white>%fixlag_avg_ping% ms"
server_info_world_header: "<aqua>World Stats:</aqua>"
server_info_world_entry: " <gray>- <gold>%fixlag_world_name%<gray>: <white>%fixlag_world_chunks% Chunks, %fixlag_world_entities% Entities"
update_available: "<yellow>A new version of FixLag is available: <gold>%fixlag_latest_version%"
update_current_version: "<yellow>You are currently using version: <gold>%fixlag_current_version%"
update_check_failed: "<red>Could not check for updates."
update_check_error: "<red>Error checking for updates: %fixlag_error%."

# New Messages
command_player_only: "<red>This command can only be run by a player."
command_reload_success: "<green>Configuration and messages reloaded successfully."
overload_warning: "<red>Warning! High number of targeted entities (<count>) detected near player <player>."

# Performance Info Bodies
gc_info_body: |
  <aqua>Garbage Collector: <green><gc_type></green></aqua>
  <aqua>Heap Memory:</aqua> Used=<green><used_heap>MB</green>, Free=<green><free_heap>MB</green>, Max=<green><max_heap>MB</green>
  <aqua>Non-Heap Memory:</aqua> Used=<green><used_non_heap>MB</green>, Free=<green><free_non_heap></green>, Max=<green><max_non_heap></green>
  <aqua>GC Stats:</aqua>
  <gc_stats>

server_info_body: |
  <aqua>JVM Version: <green><jvm_version></green></aqua>
  <aqua>JVM Name: <green><jvm_name></green></aqua>
  <aqua>OS Architecture: <green><os_arch></green></aqua>
  <aqua>OS Name: <green><os_name></green></aqua>
  %fixlag_tps_line%
  %fixlag_ram_line%
  %fixlag_cpu_line%

# Logs
log_memory_stats: "Memory Stats - Heap: Used=<used_heap>MB, Free=<free_heap>MB, Max=<max_heap>MB | Non-Heap: Used=<used_non_heap>MB, Free=<free_non_heap>, Max=<max_non_heap> | GC: <gc_stats>"
